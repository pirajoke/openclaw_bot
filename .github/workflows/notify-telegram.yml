name: Telegram Notify Reusable

on:
  workflow_call:
    inputs:
      topic_id:
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ inputs.topic_id }}
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          if [ "$EVENT" = "issues" ]; then
            case "$ACTION" in
              opened)   EMOJI="🆕"; HEADER="New Issue" ;;
              closed)   EMOJI="✅"; HEADER="Closed" ;;
              reopened) EMOJI="🔄"; HEADER="Reopened" ;;
              *)        exit 0 ;;
            esac
            NUM="${{ github.event.issue.number }}"
            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"
          elif [ "$EVENT" = "pull_request" ]; then
            case "$ACTION" in
              opened)           EMOJI="🔀"; HEADER="New PR" ;;
              ready_for_review) EMOJI="👀"; HEADER="PR Ready" ;;
              closed)
                if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                  EMOJI="🟣"; HEADER="PR Merged"
                else
                  EMOJI="❌"; HEADER="PR Closed"
                fi ;;
              *) exit 0 ;;
            esac
            NUM="${{ github.event.pull_request.number }}"
            TITLE="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
          else
            exit 0
          fi

          SAFE_TITLE=$(echo "$TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          REPO="${{ github.repository }}"

          MSG="$EMOJI <b>$HEADER #$NUM</b>
          <a href=\"$URL\">$SAFE_TITLE</a>
          📂 <code>$REPO</code>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_thread_id=${TOPIC_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" | jq .
